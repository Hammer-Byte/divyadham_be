name: divyadham_api DEV Deployment

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOYMENT_DIRECTORY: "/var/www/sites/dev-divyadham.hammerbyte.co.in/"
      REPO: "divyadham_api"
      BRANCH: ${{ github.ref_name }}
      # ENTRY: "app.js"

    steps:
      - name: Preparing SSH
        run: sudo apt-get install -y sshpass

      - name: SSH Deployment
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no "${{ secrets.SSH_USERNAME }}@${{ secrets.HOSTING_SERVER }}" << 'EOF'
            set -e
            cd "${{ env.DEPLOYMENT_DIRECTORY }}"
            if [ -d "${{ env.REPO }}" ]; then
              cd "${{ env.REPO }}"
              pid=$(cat process.id)
              if ps -p $pid > /dev/null; then
                echo "Terminating ${{ env.REPO }} - pid $pid"
                kill -9 $pid
              fi
              echo "Fetching Changes..."
              git stash
              git fetch origin "${{env.BRANCH}}"
              git checkout "${{env.BRANCH}}"
              git pull origin "${{env.BRANCH}}" --rebase
            else
              echo "Fetching Source - ${{ env.REPO }}"
              git clone --branch "${{env.BRANCH}}" https://github.com/Hammer-Byte/${{ env.REPO }}
              cd "${{ env.REPO }}"
            fi

            echo "Installing dependencies..."
            composer install --optimize-autoloader
            php artisan key:generate
            php artisan storage:link
            php artisan migrate
            npm install
            npx mix --production
            echo "Starting app..."
            nohup php artisan serve > /dev/null 2>&1 &
            new_pid=$!
            echo "Starting ${{ env.REPO }} - pid $new_pid"
            echo $new_pid > process.id
            echo "✅ Deployed & Disconnecting SSH"
            exit 1
          EOF
