name: divyadham_api DEV Deployment

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOYMENT_DIRECTORY: "/var/www/sites/dev-divyadham.hammerbyte.co.in/"
      REPO: "divyadham_be"
      BRANCH: ${{ github.ref_name }}
      PORT: 8000

    steps:
      - name: Preparing SSH
        run: sudo apt-get install -y sshpass

      - name: SSH Deployment
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no "${{ secrets.SSH_USERNAME }}@${{ secrets.HOSTING_SERVER }}" << 'EOF'
            set -e
            cd "${{ env.DEPLOYMENT_DIRECTORY }}"
            echo "Cleaning up port ${{env.PORT}}..."
            fuser -k ${{ env.PORT }}/tcp || true
            if [ -d "${{ env.REPO }}" ]; then
              cd "${{ env.REPO }}"
              echo "Fetching Changes..."
              git stash
              git fetch origin "${{env.BRANCH}}"
              git checkout "${{env.BRANCH}}"
              git pull origin "${{env.BRANCH}}" --rebase
            else
              echo "Fetching Source - ${{ env.REPO }}"
              git clone --branch "${{env.BRANCH}}" https://github.com/Hammer-Byte/${{ env.REPO }}
              cd "${{ env.REPO }}"
            fi

            echo "Cleaning up duplicate OAuth migrations..."
            find database/migrations -name "2026_*_create_oauth_*.php" -type f -delete || true
            
            echo "Installing dependencies...."
            composer install --no-dev --optimize-autoloader
            npm install --legacy-peer-deps
            npm run prod

            # Clear old caches first
            php artisan optimize:clear

            # Run migrations (never fresh on production!)
            php artisan migrate --force

            # Passport keys (only if not already generated)
            php artisan passport:keys --force

            # Cache everything for performance
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Storage symlink
            php artisan storage:link

            echo "Starting app..."
            nohup php artisan serve --env=production > /dev/null 2>&1 &
            echo "Starting ${{ env.REPO }}"
            echo "✅ Deployed & Disconnecting SSH"
            exit 0
          EOF
